<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>All Posts</title>
  <link rel="icon" type="image/icon" href="/imgs/logo.ico">

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/blog.css">

  <style>

    .center-feed {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

  </style>

</head>

<body>

<nav class="navbar">

  <div class="container nav-inner">

    <a href="./index.html" class="logo-link">
      <div class="logo">
        Nov<span>ex</span>
      </div>
    </a>

    <div class="nav-links" id="nav_auth"></div>

  </div>

</nav>

<div class="center-feed">

  <main class="main-feed">

    <div class="feed-header">

      <h1 class="blog-post-title">
        Financial Discussion Feed
      </h1>

      <p class="muted">
        Explore community discussions about markets,
        economics, fintech and cybersecurity.
      </p>

    </div>

    <div class="search-bar" style="margin-bottom:24px;">
      <input
        type="text"
        id="search_input"
        placeholder="Search posts..."
        style="padding:10px 14px;width:70%;border-radius:6px;border:1px solid #333;background:#161b22;color:#e6edf3;font-size:0.95rem;"
      >
      <button
        id="search_btn"
        style="padding:10px 18px;margin-left:8px;border-radius:6px;border:none;background:#238636;color:#fff;cursor:pointer;font-size:0.95rem;"
      >Search</button>
      <button
        id="clear_search_btn"
        style="padding:10px 14px;margin-left:6px;border-radius:6px;border:1px solid #333;background:transparent;color:#8b949e;cursor:pointer;font-size:0.95rem;display:none;"
      >Clear</button>
    </div>

    <div id="posts_container">

      <div class="blog-post">

        <div class="blog-post-header">

          <div>

            <h2 class="blog-post-title">
              Loading posts...
            </h2>

          </div>

        </div>

      </div>

    </div>

  </main>

</div>

<script src="../js/main.js"></script>
<script src="../js/posts.js"></script>

</body>
</html>
