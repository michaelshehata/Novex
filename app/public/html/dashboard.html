<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="icon" type="image/icon" href="/imgs/logo.ico">

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<nav class="navbar">
  <div class="container nav-inner">

    <a href="./index.html" class="logo-link">
      <div class="logo">
          Nov<span>ex</span>
      </div>
    </a>

    <div class="nav-links" id="nav_auth"></div>

  </div>
</nav>

<section class="hero">

  <div class="container hero-grid">

    <div class="card hero-card">

      <h1>Secure Financial Discussions</h1>

      <p class="muted">
        Discuss markets, investing, fintech and economics
        inside a security-focused web platform.
      </p>

    </div>

    <div class="card security-status">

      <div class="security-item">
        ✔ Secure Session Active
      </div>

      <div class="security-item">
        ✔ CSRF Protection Enabled
      </div>

      <div class="security-item">
        ✔ MFA Enabled
      </div>

      <div class="security-item">
        ✔ Encrypted Database Storage
      </div>

    </div>

  </div>

</section>

<section class="container">

  <h2 class="section-title">Latest Posts</h2>

  <div class="post-grid" id="latest_posts">

    <div class="card post-card">
      <h3>Loading posts...</h3>
    </div>

  </div>

</section>

<script src="../js/main.js"></script>
<script src="../js/dashboard.js"></script>
<script src="../js/loadLatestPosts.js"></script>

</body>
</html>
