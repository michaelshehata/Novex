<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Novex - Login</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/auth.css">

  <script src="../js/login.js" defer></script>
</head>

<body>

  <nav class="navbar">
    <div class="container nav-inner">
        <a href="./index.html" class="logo-link">
          <div class="logo">
            Nov<span>ex</span>
          </div>
        </a>

      <div class="nav-links">
        <a class="nav-btn" href="./register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="auth-wrapper">
    <div class="card auth-card">

      <h1 class="auth-title">Secure Login</h1>

      <p class="auth-subtitle">
        Access your secure finance discussion dashboard.
      </p>

      <form
        method="post"
        action="/auth/login"
        id="login_form"
        class="auth-form"
      >

        <input type="hidden" id="csrf_token" name="_csrf">

        <input
          type="text"
          id="username_input"
          name="username"
          placeholder="Username"
          required
        >

        <input
          type="password"
          id="password_input"
          name="password"
          placeholder="Password"
          required
        >

        <input
          type="text"
          id="totp_input"
          name="totpCode"
          placeholder="Authenticator Code (if enabled)"
        >

        <button class="primary-btn" type="submit">
          Sign In
        </button>

      </form>

      <div class="security-box">
        <strong>Security Features</strong>

        <ul>
          <li>Protected with CSRF mitigation</li>
          <li>Argon2id password hashing</li>
          <li>Two-factor authentication support</li>
          <li>Secure session management</li>
        </ul>
      </div>

    </div>
  </main>

<script src="../js/main.js"></script>
<script src="../js/register.js"></script>
<script src="../js/login.js"></script>

</body>
</html>
