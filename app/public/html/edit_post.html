<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Edit Post</title>
  <link rel="icon" type="image/icon" href="/imgs/logo.ico">

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/blog.css">

  <style>

    .center-create {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

  </style>

</head>

<body>

<nav class="navbar">

  <div class="container nav-inner">

    <a href="./index.html" class="logo-link">
      <div class="logo">
        Nov<span>ex</span>
      </div>
    </a>

    <div class="nav-links" id="nav_auth"></div>

  </div>

</nav>

<div class="center-create">

  <main class="main-feed">

    <div class="blog-post">

      <h1 class="blog-post-title">
        Edit Post
      </h1>

      <p class="muted">
        Update your financial discussion post.
      </p>

      <br><br>

      <form
        id="edit_post_form"
        class="auth-form"
      >

        <input
          type="hidden"
          name="_csrf"
          id="csrf_token"
        >

        <input
          type="text"
          name="title"
          id="post_title"
          placeholder="Post title"
          maxlength="200"
          required
        >

        <textarea
          name="content"
          id="post_content"
          rows="14"
          placeholder="Write your financial discussion here..."
          required
        ></textarea>

        <br>

        <div class="security-box">

          <strong>Formatting & Security</strong>

          <ul>
            <li>Unsafe scripts are automatically blocked</li>
            <li>XSS sanitisation is enforced server-side</li>
            <li>Authenticated session required</li>
          </ul>

        </div>

        <br>

        <div id="edit_error" style="color:#ff6b6b;display:none;"></div>

        <br>

        <div class="post-actions">

          <button
            type="submit"
            class="post-btn"
            id="save_post_btn"
          >
            Save Changes
          </button>

          <a
            href="/my_posts"
            class="post-btn"
          >
            Cancel
          </a>

        </div>

      </form>

    </div>

  </main>

</div>

<script src="../js/main.js"></script>
<script src="../js/edit_post.js"></script>

</body>
</html>
